<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="210mm" height="297mm" viewBox="0 0 210 297"
     role="img" aria-labelledby="title desc">
  <title id="title">VIP Antique Royal Certificate Border — Design 2</title>
  <desc id="desc">A minimal crown-free A4 portrait certificate border with antique ivory paper, burgundy and aged-gold geometric framing, Mughal-inspired corner scrolls and restrained lotus medallions.</desc>

  <defs>
    <linearGradient id="paper2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efe1bb"/>
      <stop offset="0.2" stop-color="#fff9e8"/>
      <stop offset="0.52" stop-color="#f8efd7"/>
      <stop offset="0.82" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#e6cf9a"/>
    </linearGradient>

    <radialGradient id="centerLight" cx="50%" cy="45%" r="72%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.7" stop-color="#fff9e7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6d451a" stop-opacity="0.12"/>
    </radialGradient>

    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#63400e"/>
      <stop offset="0.2" stop-color="#c79839"/>
      <stop offset="0.43" stop-color="#f3dc89"/>
      <stop offset="0.62" stop-color="#9b6c1c"/>
      <stop offset="0.83" stop-color="#e5c56d"/>
      <stop offset="1" stop-color="#5c3809"/>
    </linearGradient>

    <linearGradient id="burgundy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c0d12"/>
      <stop offset="0.48" stop-color="#6e2931"/>
      <stop offset="1" stop-color="#321015"/>
    </linearGradient>

    <filter id="paperGrain2" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.58" numOctaves="3" seed="41" result="grain"/>
      <feColorMatrix in="grain" type="matrix" values="0 0 0 0 0.43  0 0 0 0 0.26  0 0 0 0 0.08  0 0 0 .055 0" result="tint"/>
      <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
    </filter>

    <filter id="fineShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.42" result="blur"/>
      <feOffset dx="0.32" dy="0.38" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 .33 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="diamondBandH" width="9" height="3" patternUnits="userSpaceOnUse">
      <path d="M0 1.5 H2.5 L4.5 0.25 L6.5 1.5 H9 M2.5 1.5 L4.5 2.75 L6.5 1.5" fill="none" stroke="#a87824" stroke-width="0.3"/>
      <circle cx="4.5" cy="1.5" r="0.42" fill="#6e2931"/>
    </pattern>

    <pattern id="diamondBandV" width="3" height="9" patternUnits="userSpaceOnUse">
      <path d="M1.5 0 V2.5 L0.25 4.5 L1.5 6.5 V9 M1.5 2.5 L2.75 4.5 L1.5 6.5" fill="none" stroke="#a87824" stroke-width="0.3"/>
      <circle cx="1.5" cy="4.5" r="0.42" fill="#6e2931"/>
    </pattern>

    <symbol id="geometricCorner" viewBox="0 0 46 46">
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.2 43.5 C2.4 22 22 2.4 43.5 2.2" stroke="#2d0d12" stroke-width="2.25"/>
        <path d="M2.2 43.5 C2.4 22 22 2.4 43.5 2.2" stroke="url(#gold2)" stroke-width="1.05"/>
        <path d="M6.1 43.5 C6.2 24.6 24.6 6.2 43.5 6.1" stroke="#6e2931" stroke-width="0.72"/>
        <path d="M10.2 42.8 C10.2 28.2 28.2 10.2 42.8 10.2" stroke="#c79a3d" stroke-width="0.48" stroke-dasharray="1.4 1.2"/>

        <path d="M4 31.5 C9.7 27.4 14.2 29.2 13.9 33.5 C13.6 37.4 9.2 38.1 8.2 35.1" stroke="#6b2a31" stroke-width="1.05"/>
        <path d="M31.5 4 C27.4 9.7 29.2 14.2 33.5 13.9 C37.4 13.6 38.1 9.2 35.1 8.2" stroke="#6b2a31" stroke-width="1.05"/>
        <path d="M11.4 29.3 C18 24.5 23.9 18.6 29.2 11.5" stroke="#a87925" stroke-width="0.72"/>
        <path d="M14.9 34.1 C21.1 31.3 26.4 26 29.3 19.8" stroke="#a87925" stroke-width="0.55"/>
        <path d="M34.1 14.9 C31.3 21.1 26 26.4 19.8 29.3" stroke="#a87925" stroke-width="0.55"/>
      </g>

      <g transform="translate(21.8 21.8)" filter="url(#fineShadow)">
        <path d="M0 -7 C2.1 -4.7 3.1 -2.5 2.1 0 C4.7 -1.1 6.8 0 7 2.3 C4.4 3.6 2.1 3.4 0 1.4 C-2.1 3.4 -4.4 3.6 -7 2.3 C-6.8 0 -4.7 -1.1 -2.1 0 C-3.1 -2.5 -2.1 -4.7 0 -7Z" fill="url(#gold2)" stroke="#3a1315" stroke-width="0.65"/>
        <path d="M0 -3.2 C1.9 -1.4 1.9 1.4 0 3.2 C-1.9 1.4 -1.9 -1.4 0 -3.2Z" fill="#762d35" stroke="#3a1315" stroke-width="0.4"/>
        <circle cx="0" cy="0" r="1.15" fill="#f0d27b" stroke="#3a1315" stroke-width="0.42"/>
      </g>

      <g fill="#6e2931" stroke="#3a1315" stroke-width="0.25">
        <path d="M4.7 20.8 l2.2 -3.3 2.2 3.3 -2.2 3.3Z"/>
        <path d="M20.8 4.7 l-3.3 2.2 3.3 2.2 3.3 -2.2Z"/>
      </g>
    </symbol>

    <symbol id="lotusMedallion" viewBox="0 0 40 16">
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 8 H10 C13 8 14.2 5.5 16 3.2 C17.2 5.8 18.5 7 20 8 C21.5 7 22.8 5.8 24 3.2 C25.8 5.5 27 8 30 8 H39" stroke="#3c1216" stroke-width="1.2"/>
        <path d="M1 8 H10 C13 8 14.2 5.5 16 3.2 C17.2 5.8 18.5 7 20 8 C21.5 7 22.8 5.8 24 3.2 C25.8 5.5 27 8 30 8 H39" stroke="url(#gold2)" stroke-width="0.55"/>
        <path d="M13.5 9 C15.8 9 17.8 10.4 20 13 C22.2 10.4 24.2 9 26.5 9" stroke="#8c5f1c" stroke-width="0.65"/>
      </g>
      <path d="M20 2.1 C23.1 5 22.6 7.8 20 10.1 C17.4 7.8 16.9 5 20 2.1Z" fill="url(#gold2)" stroke="#3c1216" stroke-width="0.5"/>
      <circle cx="20" cy="8.3" r="1.15" fill="#782f37" stroke="#3c1216" stroke-width="0.38"/>
    </symbol>

    <symbol id="sideDiamond" viewBox="0 0 12 24">
      <path d="M6 1 L11 7 L8 12 L11 17 L6 23 L1 17 L4 12 L1 7Z" fill="#f5e5b7" stroke="#5b2229" stroke-width="0.8"/>
      <path d="M6 4.5 L8.3 8 L6 11.5 L3.7 8Z M6 12.5 L8.3 16 L6 19.5 L3.7 16Z" fill="url(#gold2)" stroke="#5b2229" stroke-width="0.4"/>
      <circle cx="6" cy="12" r="1.15" fill="#6e2931" stroke="#3a1315" stroke-width="0.35"/>
    </symbol>
  </defs>

  <g inkscape:groupmode="layer" inkscape:label="Antique paper">
    <rect width="210" height="297" fill="url(#paper2)"/>
    <rect x="1.2" y="1.2" width="207.6" height="294.6" rx="1" fill="url(#centerLight)" filter="url(#paperGrain2)"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="Outer geometric frame" fill="none" stroke-linejoin="round">
    <rect x="4.5" y="4.5" width="201" height="288" rx="0.8" stroke="#2c0d12" stroke-width="1.5"/>
    <rect x="5.8" y="5.8" width="198.4" height="285.4" rx="0.5" stroke="url(#gold2)" stroke-width="0.82"/>
    <rect x="8.1" y="8.1" width="193.8" height="280.8" stroke="#64262d" stroke-width="0.72"/>
    <rect x="9.4" y="9.4" width="191.2" height="278.2" stroke="#d1a44b" stroke-width="0.34"/>

    <path d="M23 13.2 H187 L196.8 23 V274 L187 283.8 H23 L13.2 274 V23Z" stroke="#381116" stroke-width="1.05"/>
    <path d="M24 15.1 H186 L194.9 24 V273 L186 281.9 H24 L15.1 273 V24Z" stroke="url(#gold2)" stroke-width="0.58"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="Subtle patterned rails" opacity="0.68">
    <rect x="20" y="17.4" width="170" height="3" fill="url(#diamondBandH)"/>
    <rect x="20" y="276.6" width="170" height="3" fill="url(#diamondBandH)"/>
    <rect x="17.4" y="24" width="3" height="249" fill="url(#diamondBandV)"/>
    <rect x="189.6" y="24" width="3" height="249" fill="url(#diamondBandV)"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="Inner content frame" fill="none" stroke-linejoin="round">
    <path d="M24 20.5 H186 L189.5 24 V273 L186 276.5 H24 L20.5 273 V24Z" stroke="#5d2229" stroke-width="0.72"/>
    <path d="M25.2 22.2 H184.8 L187.8 25.2 V271.8 L184.8 274.8 H25.2 L22.2 271.8 V25.2Z" stroke="#d0a044" stroke-width="0.38"/>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="Mughal geometric corners" filter="url(#fineShadow)">
    <use xlink:href="#geometricCorner" x="9" y="9" width="32" height="32"/>
    <g transform="translate(210 0) scale(-1 1)"><use xlink:href="#geometricCorner" x="9" y="9" width="32" height="32"/></g>
    <g transform="translate(0 297) scale(1 -1)"><use xlink:href="#geometricCorner" x="9" y="9" width="32" height="32"/></g>
    <g transform="translate(210 297) scale(-1 -1)"><use xlink:href="#geometricCorner" x="9" y="9" width="32" height="32"/></g>
  </g>

  <g inkscape:groupmode="layer" inkscape:label="Lotus medallions" filter="url(#fineShadow)">
    <use xlink:href="#lotusMedallion" x="91" y="9" width="28" height="11.2"/>
    <g transform="translate(0 297) scale(1 -1)"><use xlink:href="#lotusMedallion" x="91" y="9" width="28" height="11.2"/></g>
    <use xlink:href="#sideDiamond" x="10.3" y="140.5" width="8" height="16"/>
    <g transform="translate(210 0) scale(-1 1)"><use xlink:href="#sideDiamond" x="10.3" y="140.5" width="8" height="16"/></g>
  </g>
</svg>
