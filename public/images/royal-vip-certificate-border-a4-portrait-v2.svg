<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="210mm" height="297mm" viewBox="0 0 210 297"
     role="img" aria-labelledby="title description">
  <title id="title">Royal VIP Certificate Border — A4 Portrait</title>
  <desc id="description">A crisp, editable, old-world royal certificate border in deep maroon and antique gold.</desc>

  <defs>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D430B"/>
      <stop offset="0.22" stop-color="#D4A839"/>
      <stop offset="0.43" stop-color="#FFF1A4"/>
      <stop offset="0.62" stop-color="#C28B22"/>
      <stop offset="0.82" stop-color="#F1D471"/>
      <stop offset="1" stop-color="#65400D"/>
    </linearGradient>
    <linearGradient id="gWine" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#861C2A"/>
      <stop offset="0.46" stop-color="#4A0710"/>
      <stop offset="1" stop-color="#74121D"/>
    </linearGradient>
    <radialGradient id="gGem" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#B8404D"/>
      <stop offset="0.45" stop-color="#710F1C"/>
      <stop offset="1" stop-color="#310208"/>
    </radialGradient>

    <!-- One clean royal corner; all four corners are exact mirrors. -->
    <g id="royalCorner">
      <!-- Strong architectural bracket -->
      <path d="M8.4 42 V14.4 Q8.4 8.4 14.4 8.4 H42"
            fill="none" stroke="#3B050B" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8.4 42 V14.4 Q8.4 8.4 14.4 8.4 H42"
            fill="none" stroke="url(#gGold)" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Inner fine bracket -->
      <path d="M11.6 37.5 V18 Q11.6 11.6 18 11.6 H37.5"
            fill="none" stroke="#F0D073" stroke-width="0.48" stroke-linecap="round"/>

      <!-- Corner medallion -->
      <path d="M10.8 16.2 L16.2 10.8 L21.6 16.2 L16.2 21.6 Z"
            fill="url(#gWine)" stroke="#3A050A" stroke-width="1.1"/>
      <path d="M12.1 16.2 L16.2 12.1 L20.3 16.2 L16.2 20.3 Z"
            fill="none" stroke="url(#gGold)" stroke-width="0.7"/>
      <ellipse cx="16.2" cy="16.2" rx="2.1" ry="2.1" fill="url(#gGold)"/>
      <ellipse cx="16.2" cy="16.2" rx="1.08" ry="1.08" fill="url(#gGem)" stroke="#F4DA7B" stroke-width="0.3"/>

      <!-- Horizontal laurel, kept away from the vertical ornament -->
      <path d="M21.3 13.6 C27 9.8 33.6 10.3 39.2 12.8"
            fill="none" stroke="url(#gGold)" stroke-width="0.7" stroke-linecap="round"/>
      <path d="M24 13 C25 9.7 27.4 8.4 30.2 8.8 C29.4 11.4 27.2 13 24 13Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.48"/>
      <path d="M29.9 11.1 C31.9 8.4 34.6 8.1 37.2 9.4 C35.6 11.7 33.1 12.5 29.9 11.1Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.48"/>
      <path d="M28.4 12.1 C30.3 15 33.1 15.6 35.9 14.5 C34.4 12.2 31.8 11.4 28.4 12.1Z"
            fill="#62101A" stroke="url(#gGold)" stroke-width="0.42"/>

      <!-- Vertical laurel -->
      <path d="M13.6 21.3 C9.8 27 10.3 33.6 12.8 39.2"
            fill="none" stroke="url(#gGold)" stroke-width="0.7" stroke-linecap="round"/>
      <path d="M13 24 C9.7 25 8.4 27.4 8.8 30.2 C11.4 29.4 13 27.2 13 24Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.48"/>
      <path d="M11.1 29.9 C8.4 31.9 8.1 34.6 9.4 37.2 C11.7 35.6 12.5 33.1 11.1 29.9Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.48"/>
      <path d="M12.1 28.4 C15 30.3 15.6 33.1 14.5 35.9 C12.2 34.4 11.4 31.8 12.1 28.4Z"
            fill="#62101A" stroke="url(#gGold)" stroke-width="0.42"/>

      <!-- One restrained scroll in the open diagonal -->
      <path d="M20.1 20.1 C24.1 18.1 28.4 19.1 29.1 22.4 C29.6 24.9 27.2 26.7 25.2 25.4 C23.6 24.4 24 22.6 25.2 21.9"
            fill="none" stroke="url(#gGold)" stroke-width="0.8" stroke-linecap="round"/>
      <path d="M20.1 20.1 C18.1 24.1 19.1 28.4 22.4 29.1 C24.9 29.6 26.7 27.2 25.4 25.2"
            fill="none" stroke="#741520" stroke-width="1.35" stroke-linecap="round"/>
      <path d="M20.1 20.1 C18.1 24.1 19.1 28.4 22.4 29.1 C24.9 29.6 26.7 27.2 25.4 25.2"
            fill="none" stroke="url(#gGold)" stroke-width="0.48" stroke-linecap="round"/>
    </g>

    <!-- Elegant centre crest for the long horizontal sides. -->
    <g id="centreCrest">
      <path d="M-28 0 H-11 C-8.2 0-7.4-2.1-5.2-3.2 C-3.5-1.8-2.1-1.1 0 0 C2.1-1.1 3.5-1.8 5.2-3.2 C7.4-2.1 8.2 0 11 0 H28"
            fill="none" stroke="#3B050B" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M-28 0 H-11 C-8.2 0-7.4-2.1-5.2-3.2 C-3.5-1.8-2.1-1.1 0 0 C2.1-1.1 3.5-1.8 5.2-3.2 C7.4-2.1 8.2 0 11 0 H28"
            fill="none" stroke="url(#gGold)" stroke-width="0.85" stroke-linecap="round"/>
      <path d="M-5.2-3.2 C-3.7-6 3.7-6 5.2-3.2 L0 2.1Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.62"/>
      <path d="M-2.3-3.2 L0-5.5 L2.3-3.2 L0-.9Z" fill="url(#gGold)"/>
      <circle cx="0" cy="-3.2" r="0.86" fill="url(#gGem)" stroke="#F5DC82" stroke-width="0.28"/>
    </g>

    <!-- Smaller vertical-side clasp. -->
    <g id="sideClasp">
      <path d="M-13 0 H-4.2 L0-3.1 L4.2 0 H13"
            fill="none" stroke="#3B050B" stroke-width="2.25" stroke-linecap="round"/>
      <path d="M-13 0 H-4.2 L0-3.1 L4.2 0 H13"
            fill="none" stroke="url(#gGold)" stroke-width="0.72" stroke-linecap="round"/>
      <path d="M-3.1-2.2 L0-5.1 L3.1-2.2 L0 .8Z"
            fill="url(#gWine)" stroke="url(#gGold)" stroke-width="0.5"/>
      <circle cx="0" cy="-2.2" r="0.72" fill="url(#gGold)"/>
    </g>
  </defs>

  <!-- Transparent background. -->
  <g id="royal-frame" shape-rendering="geometricPrecision">
    <!-- Layered engraved frame -->
    <rect x="5.2" y="5.2" width="199.6" height="286.6" rx="0.8"
          fill="none" stroke="#320308" stroke-width="1.65"/>
    <rect x="7.25" y="7.25" width="195.5" height="282.5" rx="0.55"
          fill="none" stroke="url(#gGold)" stroke-width="0.88"/>
    <rect x="8.75" y="8.75" width="192.5" height="279.5" rx="0.4"
          fill="none" stroke="#65101A" stroke-width="1.12"/>
    <rect x="10.45" y="10.45" width="189.1" height="276.1" rx="0.28"
          fill="none" stroke="#E0BD61" stroke-width="0.34"/>
    <rect x="11.75" y="11.75" width="186.5" height="273.5" rx="0.2"
          fill="none" stroke="#4A080F" stroke-width="0.42"/>
    <rect x="13.05" y="13.05" width="183.9" height="270.9" rx="0.18"
          fill="none" stroke="#B88929" stroke-width="0.24"/>

    <!-- Exact mirrored corner ornaments -->
    <use xlink:href="#royalCorner"/>
    <use xlink:href="#royalCorner" transform="translate(210 0) scale(-1 1)"/>
    <use xlink:href="#royalCorner" transform="translate(0 297) scale(1 -1)"/>
    <use xlink:href="#royalCorner" transform="translate(210 297) scale(-1 -1)"/>

    <!-- Balanced centre ornaments -->
    <use xlink:href="#centreCrest" transform="translate(105 9.55)"/>
    <use xlink:href="#centreCrest" transform="translate(105 287.45) rotate(180)"/>
    <use xlink:href="#sideClasp" transform="translate(9.55 148.5) rotate(-90)"/>
    <use xlink:href="#sideClasp" transform="translate(200.45 148.5) rotate(90)"/>

    <!-- Fine corner cuts create a tailored, printed-certificate finish. -->
    <g fill="none" stroke="#F0D276" stroke-width="0.38" stroke-linecap="round">
      <path d="M16 7.9 H47 M7.9 16 V47"/>
      <path d="M194 7.9 H163 M202.1 16 V47"/>
      <path d="M16 289.1 H47 M7.9 281 V250"/>
      <path d="M194 289.1 H163 M202.1 281 V250"/>
    </g>
  </g>
</svg>
