  <title id="heritageTitle">A4 Landscape Classic Old-Style Rococo Certificate Border</title>
  <desc id="heritageDesc">An original crown-free landscape certificate frame with muted sepia-gold Rococo shell corners, engraved lace rails, aged ivory paper and a large clear writing area.</desc>

